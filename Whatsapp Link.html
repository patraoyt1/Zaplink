<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapLink - Gerador de Link WhatsApp</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background: radial-gradient(circle at top right, #0f172a, #020617);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div x-data="whatsappGen()" x-cloak class="w-full max-w-md">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-green-500/10 rounded-3xl mb-4 border border-green-500/20">
                <i class="fa-brands fa-whatsapp text-green-500 text-4xl"></i>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tighter italic">ZAP<span class="text-green-500">LINK</span></h1>
            <p class="text-gray-400 text-sm mt-2">Inicie conversas instantâneas sem salvar contatos.</p>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl space-y-6">
            
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 ml-2 mb-1 block">País</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3.5 text-gray-500 font-bold">+</span>
                        <input x-model="pais" type="number" placeholder="55" 
                               class="w-full bg-black/40 text-white pl-7 pr-2 py-3.5 rounded-2xl border border-white/10 focus:border-green-500 outline-none transition font-bold">
                    </div>
                </div>

                <div class="col-span-2">
                    <label class="text-[10px] uppercase font-bold text-gray-500 ml-2 mb-1 block">DDD + Número (só números)</label>
                    <input x-model="numero" @input="formatarEntrada" type="text" placeholder="11999999999" 
                           class="w-full bg-black/40 text-white px-4 py-3.5 rounded-2xl border border-white/10 focus:border-green-500 outline-none transition font-bold tracking-widest">
                </div>
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 ml-2 mb-1 block">Mensagem (Opcional)</label>
                <textarea x-model="mensagem" rows="3" placeholder="Olá! Eu gostaria de conversar..." 
                          class="w-full bg-black/40 text-white p-4 rounded-2xl border border-white/10 focus:border-green-500 outline-none transition text-sm resize-none"></textarea>
            </div>

            <button @click="gerarEAbrir" 
                    class="w-full bg-green-600 hover:bg-green-500 active:scale-95 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-green-900/30 flex items-center justify-center gap-3 text-lg">
                <i class="fa-solid fa-paper-plane"></i> INICIAR CONVERSA
            </button>

            <div x-show="linkGerado" x-transition.scale.origin.top class="pt-4 border-t border-white/10 mt-4">
                <p class="text-[10px] text-green-400 font-bold uppercase text-center mb-3">Link Gerado com Sucesso</p>
                <div class="flex items-center gap-2">
                    <div class="flex-1 bg-black/60 p-3 rounded-xl border border-white/5 truncate text-xs font-mono text-gray-400" x-text="linkGerado"></div>
                    <button @click="copiarLink" class="bg-white/10 hover:bg-white/20 p-3 rounded-xl transition text-white" title="Copiar Link">
                        <i class="fa-solid fa-copy"></i>
                    </button>
                </div>
            </div>

        </div>

        <p class="text-center text-gray-600 text-[10px] mt-8 uppercase tracking-widest font-bold">
            Simples • Rápido • Seguro
        </p>

    </div>

    <script>
        function whatsappGen() {
            return {
                pais: '55',
                numero: '',
                mensagem: '',
                linkGerado: '',

                formatarEntrada() {
                    // Garante que apenas números entrem no campo
                    this.numero = this.numero.replace(/\D/g, '');
                },

                gerarEAbrir() {
                    if (!this.numero || this.numero.length < 10) {
                        alert("Por favor, insira o DDD + Número completo (mínimo 10 dígitos).");
                        return;
                    }
                    
                    // Monta a URL final
                    const numeroLimpo = this.pais + this.numero;
                    let url = `https://wa.me/${numeroLimpo}`;
                    
                    if (this.mensagem.trim()) {
                        url += `?text=${encodeURIComponent(this.mensagem)}`;
                    }
                    
                    // Atualiza o estado para mostrar o link na tela
                    this.linkGerado = url;

                    // Abre o WhatsApp em uma nova aba
                    window.open(url, '_blank');
                },

                copiarLink() {
                    if (!this.linkGerado) return;
                    navigator.clipboard.writeText(this.linkGerado);
                    alert("Link copiado! Agora você pode enviar para quem quiser.");
                }
            }
        }
    </script>

</body>
</html>
